<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poker Cred Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>🃏 Poker Cred Calculator</h1>
  <p class="subtitle">Figure out who owes whom at the end of the night</p>

  <div class="card">
    <div class="settings-row">
      <label>
        ₹
        <input type="number" id="rupees" value="1" min="1" />
      </label>
      <label>
        = Chips
        <input type="number" id="chipsPerRupee" value="5" min="1" />
      </label>
      <label>
        Chips per buy-in
        <input type="number" id="chipsPerBuyin" value="500" min="1" />
      </label>
    </div>
    <p class="chip-value-note" id="chipNote">1 chip = ₹0.20 &nbsp;|&nbsp; 5 chips = ₹1</p>
  </div>

  <div class="card">
    <div class="players-header">
      <h2>Players</h2>
      <button class="btn-add" onclick="addPlayer()">+ Add Player</button>
    </div>
    <div class="players-col-labels">
      <span>Name</span>
      <span>Buy-ins</span>
      <span>Final chips</span>
      <span></span>
    </div>
    <div id="playerList"></div>
  </div>

  <p class="error" id="errorMsg"></p>
  <button class="btn-calc" onclick="calculate()">Calculate Settlements</button>

  <script src="app.js"></script>
</body>
</html>

<!-- Settlement Modal -->
<div id="modal" class="modal-overlay" onclick="closeModal(event)">
  <div class="modal-box">
    <div class="modal-header">
      <h2>🃏 Settlements</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalContent"></div>
  </div>
</div>
