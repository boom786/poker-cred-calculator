<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poker Cred Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 24px 16px;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 4px;
      color: #f0c040;
    }

    .subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 24px;
    }

    .card {
      background: #16213e;
      border-radius: 12px;
      padding: 20px;
      max-width: 560px;
      margin: 0 auto 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .settings-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .settings-row label {
      flex: 1;
      min-width: 140px;
      font-size: 0.85rem;
      color: #aaa;
    }

    .settings-row input {
      width: 100%;
      margin-top: 4px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #0f3460;
      color: #fff;
      font-size: 1rem;
    }

    .players-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .players-header h2 { font-size: 1rem; color: #f0c040; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.9rem;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }

    .btn-add {
      background: #0f3460;
      color: #f0c040;
      border: 1px solid #f0c040;
    }

    .btn-calc {
      width: 100%;
      background: #f0c040;
      color: #1a1a2e;
      font-weight: bold;
      font-size: 1rem;
      padding: 12px;
      border-radius: 10px;
      max-width: 560px;
      display: block;
      margin: 0 auto 20px;
    }

    .btn-reset {
      width: 100%;
      background: transparent;
      color: #aaa;
      border: 1px solid #444;
      font-size: 0.85rem;
      padding: 8px;
      border-radius: 10px;
      max-width: 560px;
      display: block;
      margin: 0 auto 20px;
    }

    .player-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      align-items: center;
    }

    .player-row input {
      flex: 1;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #0f3460;
      color: #fff;
      font-size: 0.95rem;
    }

    .player-row input::placeholder { color: #666; }

    .btn-remove {
      background: #3a1a1a;
      color: #e05555;
      border: 1px solid #e05555;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 0.85rem;
    }

    .results { max-width: 560px; margin: 0 auto; }

    .result-item {
      background: #16213e;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.95rem;
    }

    .result-item .arrow { color: #aaa; margin: 0 8px; }
    .result-item .amount { color: #f0c040; font-weight: bold; font-size: 1.05rem; }
    .result-item .payer { color: #e05555; }
    .result-item .receiver { color: #50c878; }

    .balanced {
      text-align: center;
      color: #50c878;
      font-size: 1rem;
      padding: 16px;
      background: #16213e;
      border-radius: 10px;
    }

    .error {
      color: #e05555;
      font-size: 0.85rem;
      text-align: center;
      margin-bottom: 10px;
    }

    .chip-value-note {
      text-align: center;
      font-size: 0.78rem;
      color: #888;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

  <h1>🃏 Poker Cred Calculator</h1>
  <p class="subtitle">Figure out who owes whom at the end of the night</p>

  <div class="card">
    <div class="settings-row">
      <label>
        Buy-in (₹)
        <input type="number" id="buyin" value="100" min="1" />
      </label>
      <label>
        Starting chips per player
        <input type="number" id="startChips" value="500" min="1" />
      </label>
    </div>
    <p class="chip-value-note" id="chipNote">1 chip = ₹0.20 &nbsp;|&nbsp; 5 chips = ₹1</p>
  </div>

  <div class="card">
    <div class="players-header">
      <h2>Players</h2>
      <button class="btn-add" onclick="addPlayer()">+ Add Player</button>
    </div>
    <div id="playerList"></div>
  </div>

  <p class="error" id="errorMsg"></p>
  <button class="btn-calc" onclick="calculate()">Calculate Settlements</button>
  <button class="btn-reset" onclick="resetResults()">Clear Results</button>

  <div class="results" id="results"></div>

  <script>
    let playerCount = 0;

    function chipValue() {
      const buyin = parseFloat(document.getElementById('buyin').value) || 100;
      const chips = parseFloat(document.getElementById('startChips').value) || 500;
      return buyin / chips; // rupees per chip
    }

    function updateChipNote() {
      const val = chipValue();
      const note = document.getElementById('chipNote');
      const inv = Math.round(1 / val);
      note.textContent = `1 chip = ₹${val.toFixed(4).replace(/\.?0+$/, '')}  |  ${inv} chips = ₹1`;
    }

    document.getElementById('buyin').addEventListener('input', updateChipNote);
    document.getElementById('startChips').addEventListener('input', updateChipNote);

    function addPlayer(name = '', chips = '') {
      playerCount++;
      const id = playerCount;
      const div = document.createElement('div');
      div.className = 'player-row';
      div.id = `player-${id}`;
      div.innerHTML = `
        <input type="text" placeholder="Player name" value="${name}" class="pname" />
        <input type="number" placeholder="Final chips" value="${chips}" class="pchips" min="0" />
        <button class="btn-remove" onclick="removePlayer(${id})">✕</button>
      `;
      document.getElementById('playerList').appendChild(div);
    }

    function removePlayer(id) {
      const el = document.getElementById(`player-${id}`);
      if (el) el.remove();
    }

    function resetResults() {
      document.getElementById('results').innerHTML = '';
      document.getElementById('errorMsg').textContent = '';
    }

    function calculate() {
      resetResults();
      const rows = document.querySelectorAll('.player-row');
      const startChips = parseFloat(document.getElementById('startChips').value) || 500;
      const cval = chipValue();

      if (rows.length < 2) {
        document.getElementById('errorMsg').textContent = 'Add at least 2 players.';
        return;
      }

      const players = [];
      for (const row of rows) {
        const name = row.querySelector('.pname').value.trim();
        const chips = parseFloat(row.querySelector('.pchips').value);
        if (!name) { document.getElementById('errorMsg').textContent = 'All players need a name.'; return; }
        if (isNaN(chips) || chips < 0) { document.getElementById('errorMsg').textContent = `Enter valid chip count for ${name}.`; return; }
        // net in rupees: (final chips - starting chips) * chip value
        const net = (chips - startChips) * cval;
        players.push({ name, net });
      }

      // settle debts: positive net = they won (owed money), negative = they lost (owe money)
      const creditors = players.filter(p => p.net > 0.005).map(p => ({ ...p }));
      const debtors = players.filter(p => p.net < -0.005).map(p => ({ ...p }));

      const transactions = [];
      let ci = 0, di = 0;

      while (ci < creditors.length && di < debtors.length) {
        const c = creditors[ci];
        const d = debtors[di];
        const amount = Math.min(c.net, -d.net);
        transactions.push({ from: d.name, to: c.name, amount });
        c.net -= amount;
        d.net += amount;
        if (Math.abs(c.net) < 0.005) ci++;
        if (Math.abs(d.net) < 0.005) di++;
      }

      const resultsDiv = document.getElementById('results');

      if (transactions.length === 0) {
        resultsDiv.innerHTML = '<div class="balanced">✅ Everyone is even — no settlements needed!</div>';
        return;
      }

      transactions.forEach(t => {
        const div = document.createElement('div');
        div.className = 'result-item';
        div.innerHTML = `
          <span class="payer">${t.from}</span>
          <span class="arrow">pays</span>
          <span class="receiver">${t.to}</span>
          <span class="amount">₹${t.amount.toFixed(2)}</span>
        `;
        resultsDiv.appendChild(div);
      });
    }

    // init with 4 players
    addPlayer(); addPlayer(); addPlayer(); addPlayer();
    updateChipNote();
  </script>
</body>
</html>
